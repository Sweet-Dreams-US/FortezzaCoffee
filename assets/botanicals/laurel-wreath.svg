<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Laurel wreath">
  <defs>
    <symbol id="leaf" viewBox="-12 -4 24 8">
      <path d="M -12,0 Q -6,-5 0,-3.5 Q 6,-2 12,0 Q 6,2 0,3.5 Q -6,5 -12,0 Z" />
    </symbol>
  </defs>

  <!-- LEFT BRANCH (curving from bottom up around to top) -->
  <g fill="currentColor" stroke="currentColor" stroke-width="0">
    <!-- Curving branch line -->
    <path d="M 200,372 C 90,372 32,260 56,160 C 76,72 138,28 200,30"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Leaves along left branch — paired top/bottom each cluster -->
    <use href="#leaf" x="100" y="346" width="32" height="11" transform="rotate(45 116 351)" />
    <use href="#leaf" x="84"  y="334" width="32" height="11" transform="rotate(60 100 339)" />
    <use href="#leaf" x="74"  y="312" width="32" height="11" transform="rotate(70 90  317)" />
    <use href="#leaf" x="58"  y="296" width="32" height="11" transform="rotate(80 74  301)" />
    <use href="#leaf" x="50"  y="270" width="32" height="11" transform="rotate(90 66  275)" />
    <use href="#leaf" x="44"  y="240" width="32" height="11" transform="rotate(100 60 245)" />
    <use href="#leaf" x="44"  y="208" width="32" height="11" transform="rotate(110 60 213)" />
    <use href="#leaf" x="48"  y="178" width="32" height="11" transform="rotate(120 64 183)" />
    <use href="#leaf" x="58"  y="148" width="32" height="11" transform="rotate(130 74 153)" />
    <use href="#leaf" x="74"  y="120" width="32" height="11" transform="rotate(140 90 125)" />
    <use href="#leaf" x="92"  y="92"  width="32" height="11" transform="rotate(150 108 97)" />
    <use href="#leaf" x="118" y="68"  width="32" height="11" transform="rotate(160 134 73)" />
    <use href="#leaf" x="148" y="48"  width="32" height="11" transform="rotate(170 164 53)" />

    <!-- RIGHT BRANCH (mirrored) -->
    <path d="M 200,372 C 310,372 368,260 344,160 C 324,72 262,28 200,30"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>

    <use href="#leaf" x="268" y="346" width="32" height="11" transform="rotate(-45 284 351)" />
    <use href="#leaf" x="284" y="334" width="32" height="11" transform="rotate(-60 300 339)" />
    <use href="#leaf" x="294" y="312" width="32" height="11" transform="rotate(-70 310 317)" />
    <use href="#leaf" x="310" y="296" width="32" height="11" transform="rotate(-80 326 301)" />
    <use href="#leaf" x="318" y="270" width="32" height="11" transform="rotate(-90 334 275)" />
    <use href="#leaf" x="324" y="240" width="32" height="11" transform="rotate(-100 340 245)" />
    <use href="#leaf" x="324" y="208" width="32" height="11" transform="rotate(-110 340 213)" />
    <use href="#leaf" x="320" y="178" width="32" height="11" transform="rotate(-120 336 183)" />
    <use href="#leaf" x="310" y="148" width="32" height="11" transform="rotate(-130 326 153)" />
    <use href="#leaf" x="294" y="120" width="32" height="11" transform="rotate(-140 310 125)" />
    <use href="#leaf" x="276" y="92"  width="32" height="11" transform="rotate(-150 292 97)" />
    <use href="#leaf" x="250" y="68"  width="32" height="11" transform="rotate(-160 266 73)" />
    <use href="#leaf" x="220" y="48"  width="32" height="11" transform="rotate(-170 236 53)" />

    <!-- Bottom ribbon tie -->
    <g transform="translate(200,372)">
      <path d="M -16,0 L 16,0 L 12,12 L -12,12 Z" fill="currentColor" opacity="0.7"/>
      <path d="M -14,12 L -22,28 L -8,22 Z" fill="currentColor" opacity="0.55"/>
      <path d="M  14,12 L  22,28 L  8,22 Z" fill="currentColor" opacity="0.55"/>
    </g>

    <!-- Berries scattered (small clusters) -->
    <g fill="currentColor" opacity="0.6">
      <circle cx="74" cy="262" r="2.5"/>
      <circle cx="78" cy="268" r="2.5"/>
      <circle cx="70" cy="268" r="2.5"/>

      <circle cx="326" cy="262" r="2.5"/>
      <circle cx="322" cy="268" r="2.5"/>
      <circle cx="330" cy="268" r="2.5"/>

      <circle cx="118" cy="138" r="2.5"/>
      <circle cx="282" cy="138" r="2.5"/>
    </g>
  </g>
</svg>
