<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     role="img" aria-label="Fortezza Coffee — il caffè della fortezza">
  <defs>
    <!-- Navy gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1B40"/>
      <stop offset="0.7" stop-color="#142659"/>
      <stop offset="1" stop-color="#1E3A8C"/>
    </linearGradient>
    <!-- Soft red glow top-left -->
    <radialGradient id="glowR" cx="0.18" cy="0.20" r="0.6">
      <stop offset="0" stop-color="#DC2626" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold glow bottom-right -->
    <radialGradient id="glowG" cx="0.82" cy="0.80" r="0.55">
      <stop offset="0" stop-color="#C9A24E" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#C9A24E" stop-opacity="0"/>
    </radialGradient>
    <!-- Single laurel leaf reused via <use> -->
    <symbol id="lf" viewBox="-12 -4 24 8">
      <path d="M -12,0 Q -6,-5 0,-3.5 Q 6,-2 12,0 Q 6,2 0,3.5 Q -6,5 -12,0 Z" fill="currentColor"/>
    </symbol>
  </defs>

  <!-- Background plate -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <rect width="1200" height="630" fill="url(#glowG)"/>

  <!-- Tricolor strip top -->
  <g>
    <rect x="0"   y="0" width="400" height="6" fill="#1E3A8C"/>
    <rect x="400" y="0" width="400" height="6" fill="#FCFAF4"/>
    <rect x="800" y="0" width="400" height="6" fill="#DC2626"/>
  </g>

  <!-- Diagonal chevron accents (corners) -->
  <g opacity="0.16">
    <path d="M 1080,-40 L 1280,-40 L 1280,160 Z" fill="#DC2626"/>
    <path d="M -40,470 L -40,670 L 160,670 Z" fill="#C9A24E"/>
  </g>

  <!-- LEFT SIDE: badge + laurel halo -->
  <g transform="translate(310, 320)">
    <!-- Outer dashed ring -->
    <circle r="244" fill="none" stroke="#FCFAF4" stroke-width="1" stroke-dasharray="3 8" opacity="0.18"/>
    <!-- Inner thin ring -->
    <circle r="222" fill="none" stroke="#FCFAF4" stroke-width="1" opacity="0.18"/>

    <!-- Subtle gold laurel garland behind badge -->
    <g color="#C9A24E" opacity="0.40">
      <!-- Left arc of leaves (rotated) -->
      <g transform="translate(-180,0)">
        <use href="#lf" width="32" height="11" transform="rotate(-30) translate(0,-10)"/>
        <use href="#lf" width="32" height="11" transform="rotate(-15) translate(0,-10)"/>
        <use href="#lf" width="32" height="11" transform="rotate(0)   translate(0,-10)"/>
        <use href="#lf" width="32" height="11" transform="rotate(15)  translate(0,-10)"/>
        <use href="#lf" width="32" height="11" transform="rotate(30)  translate(0,-10)"/>
      </g>
      <g transform="translate(180,0) scale(-1,1)">
        <use href="#lf" width="32" height="11" transform="rotate(-30) translate(0,-10)"/>
        <use href="#lf" width="32" height="11" transform="rotate(-15) translate(0,-10)"/>
        <use href="#lf" width="32" height="11" transform="rotate(0)   translate(0,-10)"/>
        <use href="#lf" width="32" height="11" transform="rotate(15)  translate(0,-10)"/>
        <use href="#lf" width="32" height="11" transform="rotate(30)  translate(0,-10)"/>
      </g>
    </g>

    <!-- Inline simplified Fortezza badge (so the OG card is self-contained, not dependent on logo.svg loading externally) -->
    <g>
      <!-- White circle plate -->
      <circle r="200" fill="#FFFFFF" stroke="#1E3A8C" stroke-width="2"/>
      <!-- Top blue arc band -->
      <path d="M -180,0 a 180,180 0 0 1 360,0 l -25,0 a 155,155 0 0 0 -310,0 z" fill="#1E3A8C"/>
      <!-- Bottom blue arc band -->
      <path d="M 180,0 a 180,180 0 0 1 -360,0 l 25,0 a 155,155 0 0 0 310,0 z" fill="#1E3A8C"/>
      <!-- Side ribbon caps -->
      <path d="M -180,0 a 180,180 0 0 1 9,-67 l 25,9 a 155,155 0 0 0 -7,57 z" fill="#1E3A8C"/>
      <path d="M -180,0 a 180,180 0 0 0 9,67  l 25,-9 a 155,155 0 0 1 -7,-57 z" fill="#1E3A8C"/>

      <!-- FORTEZZA on top arc -->
      <defs>
        <path id="topArc"  d="M -160,0 a 160,160 0 0 1 320,0"/>
        <path id="botArc"  d="M  160,0 a 160,160 0 0 1 -320,0"/>
        <path id="leftArc" d="M -160,0 a 160,160 0 0 1 0,-160"/>
      </defs>
      <text font-family="Oswald, Anton, Impact, sans-serif" font-size="34" font-weight="600" fill="#FFFFFF" letter-spacing="6">
        <textPath href="#topArc" startOffset="50%" text-anchor="middle">FORTEZZA</textPath>
      </text>
      <text font-family="Oswald, Anton, Impact, sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" letter-spacing="4">
        <textPath href="#botArc" startOffset="50%" text-anchor="middle">KE-KI ON-GA</textPath>
      </text>

      <!-- Corner accent letters in red -->
      <g font-family="Oswald, Anton, Impact, sans-serif" font-size="20" font-weight="700" fill="#DC2626" text-anchor="middle">
        <text x="-110" y="-105">F</text>
        <text x="110"  y="-105">A</text>
        <text x="-110" y="115">W</text>
        <text x="110"  y="115">C</text>
      </g>

      <!-- Cavaliere on horseback (simplified silhouette) -->
      <g fill="#DC2626">
        <!-- Banner / Fort Wayne flag suggestion -->
        <path d="M -68,-72 L 68,-72 L 84,-24 L 68,24 L -68,24 L -52,-24 Z" fill="#1E3A8C" opacity="0.85"/>
        <circle cx="48" cy="-40" r="5" fill="#DC2626"/>
        <circle cx="48" cy="-12" r="5" fill="#DC2626"/>
        <circle cx="32" cy="-26" r="5" fill="#DC2626"/>
        <path d="M 24,-52 L 64,-52 M 24,-12 L 64,-12" stroke="#FCFAF4" stroke-width="1.5" fill="none"/>

        <!-- Horse body -->
        <path d="M -64,24 C -60,12 -44,4 -24,4 L 20,4 C 36,4 48,12 52,22 L 62,44 L 56,58 L 48,58 L 44,46 L 28,46 L 24,58 L 18,58 L 18,44 L -8,44 L -12,58 L -20,58 L -20,44 L -44,40 L -52,54 L -60,54 L -62,42 Z"/>
        <!-- Horse head -->
        <path d="M 52,-4 L 70,-20 L 84,-18 L 88,-10 L 86,0 L 76,6 L 62,14 L 52,22 Z"/>
        <!-- Tail -->
        <path d="M -64,20 L -78,6 L -84,-4 L -78,2 L -68,12 Z"/>
        <!-- Legs -->
        <path d="M -40,44 L -44,64 L -40,66 L -34,50 Z"/>
        <path d="M 0,44 L -4,66 L 2,68 L 6,50 Z"/>
        <path d="M 32,46 L 28,66 L 34,68 L 38,50 Z"/>

        <!-- Rider -->
        <circle cx="0" cy="-24" r="9"/>
        <path d="M -7,-18 L -14,-4 L -8,4 L 6,4 L 14,-2 L 10,-18 Z"/>
        <!-- Standard / pennon -->
        <path d="M 10,-24 L 10,-58 L 12,-58 L 12,-24 Z"/>
        <path d="M 12,-56 L 30,-52 L 12,-46 Z"/>
      </g>
    </g>
  </g>

  <!-- RIGHT SIDE: wordmark & metadata -->
  <g transform="translate(620, 130)">
    <!-- Eyebrow -->
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="16" letter-spacing="6"
          fill="#C9A24E" text-transform="uppercase" font-weight="500">
      ANNO MMXXVI &#160;·&#160; FORT WAYNE &#160;·&#160; IN
    </text>

    <!-- Italic motto -->
    <text x="0" y="60" font-family="Cormorant Garamond, serif" font-size="38" font-style="italic"
          fill="#A8C08A" font-weight="500">
      il caffè della fortezza
    </text>

    <!-- Massive wordmark -->
    <text x="0" y="200" font-family="Oswald, Anton, Impact, sans-serif" font-size="170" font-weight="600"
          fill="#FCFAF4" letter-spacing="-2" textLength="540" lengthAdjust="spacingAndGlyphs">
      FORTEZZA
    </text>

    <!-- Red underline -->
    <rect x="0" y="218" width="270" height="6" fill="#DC2626"/>

    <!-- Ke-Ki On-Ga tag -->
    <text x="0" y="276" font-family="JetBrains Mono, monospace" font-size="20" letter-spacing="8"
          fill="#DC2626" font-weight="500">
      KE-KI · ON-GA · COFFEE
    </text>

    <!-- Three-rivers SVG -->
    <g transform="translate(0, 320)">
      <path d="M 0,16 Q 100,-10 200,12 T 540,8" fill="none" stroke="#FCFAF4" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
      <path d="M 0,30 Q 100,4 200,26 T 540,22" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
      <path d="M 0,4  Q 100,28 200,2 T 540,18" fill="none" stroke="#C9A24E" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    </g>

    <!-- Bottom tagline / address -->
    <text x="0" y="410" font-family="Cormorant Garamond, serif" font-size="22" font-style="italic"
          fill="rgba(252, 250, 244, 0.86)">
      Italian Espresso · Caffè Vergnano · Torino 1882
    </text>
    <text x="0" y="442" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="4"
          fill="rgba(252, 250, 244, 0.55)">
      215 E BERRY ST · FORT WAYNE · INDIANA · 46802
    </text>
  </g>

  <!-- Tricolor strip bottom -->
  <g>
    <rect x="0"   y="624" width="400" height="6" fill="#1E3A8C"/>
    <rect x="400" y="624" width="400" height="6" fill="#FCFAF4"/>
    <rect x="800" y="624" width="400" height="6" fill="#DC2626"/>
  </g>
</svg>
